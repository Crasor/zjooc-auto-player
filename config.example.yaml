# ===========================================
# ZJOOC 刷课助手 — 配置文件
# 复制此文件为 config.yaml 并填入你的信息
# ===========================================

account:
  username: ""          # 在浙学账号（手机号/学号）
  password: ""          # 在浙学密码
  login_url: "https://www.zjooc.cn/login"

course:
  url: ""               # 课程公告页URL，如 https://www.zjooc.cn/ucenter/student/course/study/xxx/notice

playback:
  speed: 2.0            # 播放倍速 (0.5 ~ 16)
  mute: true            # 是否静音播放
  headless: false       # 是否无头模式（true=不显示浏览器窗口）
  poll_interval: 3      # 状态轮询间隔（秒）

anti_detect:
  override_visibility: true    # 覆写页面可见性API（防止切换标签页暂停）
  simulate_activity: true      # 模拟用户鼠标活动
  activity_interval: 30        # 模拟活动间隔（秒）
